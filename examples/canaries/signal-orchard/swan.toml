schema_version = 1

[sdk]
version = "0.3.1"
revision = "sha256:92c2f3b0823465c0d0b0d4e094ef3b2c89fcbf2e984a364cb1021e95e6043874"

[game]
id = "signal-orchard"
title = "Signal Orchard"
version = "0.1.0"
template = "grid-tactics"
hardware = "color-required"
orientation = "horizontal"
initial_scene = "title"

[cartridge]
publisher_id = 0
game_id = 1
version = 1
save_type = "none"
save_bytes = 0
rtc = false

[controls.actions]
left = ["X4"]
right = ["X2"]
up = ["X3"]
down = ["X1"]
confirm = ["A"]
cancel = ["B"]
end_turn = ["START"]
reset = ["Y4"]

[budgets]
rom_bytes = 8388608
work_ram_bytes = 12288
vram_tiles = 512
palettes = 2
sprites = 8
sprites_per_scanline = 8
audio_bytes = 1024

[resources]
work_ram_bytes = 3072
vram_tiles = 0
palettes = 0
sprites = 0
sprites_per_scanline = 0

[[scenes]]
id = "title"
assets = ["title_art"]

[[scenes]]
id = "battle"
assets = ["play_art"]

[[assets]]
id = "title_art"
type = "fullscreen"
source = "assets/art/title.png"
group = "title"

[[assets]]
id = "play_art"
type = "spritesheet"
source = "assets/art/play-tiles.png"
group = "battle"

[[play.scenarios]]
id = "neutral"
title = "Neutral boot"
goal = "Reach a stable title screen after a fresh boot."
plan = "tests/play/neutral.json"
required_checks = ["title state is visually distinct", "frame is stable", "no crash or hang"]

[[play.scenarios]]
id = "interaction"
title = "First keeper route"
goal = "Enter the orchard, select the first keeper, and route it to a beacon."
plan = "tests/play/interaction.json"
required_checks = ["orchard board appears", "cursor reaches the beacon", "first keeper occupies the beacon"]

[[play.scenarios]]
id = "success"
title = "Both signals lit"
goal = "Move both keepers onto distinct radio flowers before the storm."
plan = "tests/play/success.json"
required_checks = ["both keepers move through legal two-step routes", "both beacons are occupied", "win state is visually distinct"]

[[play.scenarios]]
id = "failure"
title = "Stone-blocked route"
goal = "Try to route a selected keeper onto the center stone, then cancel."
plan = "tests/play/failure.json"
required_checks = ["stone cell rejects the move", "invalid action leaves both keepers unchanged", "cancel clears selection"]

[[play.scenarios]]
id = "reset"
title = "Storm turn and reset"
goal = "Advance the storm, move a keeper, and reset to the exact initial battle."
plan = "tests/play/reset.json"
required_checks = ["end turn reduces the storm counter", "reset restores both keepers and storm", "replay hashes match"]
